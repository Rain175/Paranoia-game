<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranoia - The Ultimate Party Game</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
        }
        @keyframes spin-coin {
            0% { transform: rotateY(0) rotateX(0); }
            50% { transform: rotateY(180deg) rotateX(180deg); }
            100% { transform: rotateY(360deg) rotateX(0); }
        }
        .spin-coin {
            animation: spin-coin 0.6s ease-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.4); }
            50% { box-shadow: 0 0 30px rgba(167, 139, 250, 0.6); }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .glass {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .glass-strong {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(63, 63, 70, 0.6);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // Icons
        function Plus({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>; }
        function Trash2({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>; }
        function Eye({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>; }
        function EyeOff({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.578 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 9.415a3 3 0 0 0-4.669 4.11"/><path d="m2 2 20 20"/><path d="M4.532 4.532A10.738 10.738 0 0 0 2.062 11.65a1 1 0 0 0 0 .696 10.75 10.75 0 0 0 11.754 6.744"/></svg>; }
        function ChevronRight({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>; }
        function Zap({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m13 2-2 10h9L9 22l2-10H2Z"/></svg>; }
        function Check({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>; }
        function Shuffle({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.2 0 2.3.6 3 1.7l1.1 1.6"/><path d="m15.4 12.8 1.2 1.7c.8 1.1 2 1.7 3.2 1.7H22"/><path d="m18 14 4 4-4 4"/></svg>; }
        function Users({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>; }
        function Copy({ size = 16, className = "" }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>; }

        const QUESTIONS = {
          icebreaker: ["Which player do you think is the most fun to be around?", "Who has the best fashion sense in the group?", "Who is most likely to cry during a sad movie?", "Who do you think is the best-dressed here?", "Who is the least likely to be up for a spontaneous plan?", "Who is most likely to become a social media influencer?", "Can you guess who here hasn't read a book since high school?", "Which player has the best sense of humor?", "Who tells the best dad jokes?", "Which person here would be the best on Big Brother?", "Who do you think has the most controversial food opinions?", "Who is most likely to volunteer as tribute in the Hunger Games?", "Who in this room do you trust the most?", "Who always has the best advice during a crisis?", "Who is the unsung soldier holding the group together?", "Which member in the group has grown the most in the past year?", "Who do you think will be the most successful in 10 years?", "Who here deserves more appreciation and recognition from the group?", "Which member do you think has a secret LEGO obsession?", "Who is most likely to adopt 10 pets in the future?", "Who has the most creative imagination?", "Who is most likely to get excited over an animated film?", "Which member in the group is the handiest at building things?", "Which player gives the cuddliest hugs?", "Who amongst the group do you think is the luckiest in love?", "Which member are you secretly very afraid of?", "Who sitting here is likely to get jealous if you go out with a new friend?", "Which player are you least likely to call during an emergency?", "Who is most likely to embarrass a friend in public?", "Pick someone in the group who is most likely to have a weird phobia", "Who do you think deserves a better romantic partner?"],
          funny: ["Who is most likely to get lost even with a GPS?", "Who's most likely to be late for a plan because they stopped to pet a dog?", "Who do you think has the most embarrassing Spotify playlists?", "Who's most likely to get blocked by a celebrity on social media?", "Who is guilty of never matching their socks?", "Who should have a reality TV show based on their life?", "Who would accidentally send a text to the wrong person?", "Who do you think has the highest alcohol tolerance?", "Which member has the best dance moves when drunk?", "Who do you think is the life of the party?", "Which player throws the best parties?", "Who is most likely to start a conga line?", "Which player in the group is most likely to have the sickest playlist?", "Who is most likely to be the party pooper?", "Who is most likely to finish all the party snacks when no one's watching?", "Who can't cook to save their life?", "Who's the gossip monger of the group?", "Who is the worst texter present here?", "Who is most likely to get an embarrassing tattoo?", "Which player is pursuing the wrong career?", "Who should try their hand at stand-up comedy?", "Who in the group has the dirtiest sense of humor?"],
          devious: ["Who is most likely to scam you?", "Who would be the scariest as a villain?", "Who is most likely to steal your fries?", "Who would make the best con artist?", "Who would be most likely to fake their own death?", "Who is most likely to sabotage you?", "Who would backstab you for a million dollars?", "Who is most likely to start drama?", "Who would be the worst person to keep a secret with?", "Who is most likely to ghost you?", "Who would be most likely to laugh at you when you trip?", "Who is the most manipulative?", "Who would be the best liar?", "Who is most likely to use you to get what they want?", "Who would snitch on you?", "Who is most likely to take credit for your work?", "Who would betray your trust?", "Who is the shadiest person here?", "Who would gaslight you?", "Who would spread rumors about you?"],
        };

        // Firebase Configuration
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyDBx9ooN1RNK1vsNyrNgC-4B-ePy9VIjfM",
            authDomain: "paranoia-game-549b9.firebaseapp.com",
            projectId: "paranoia-game-549b9",
            databaseURL: "https://paranoia-game-549b9-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "paranoia-game-549b9.firebasestorage.app",
            messagingSenderId: "426674405580",
            appId: "1:426674405580:web:ac092ca343c83d572ec269"
        };

        let firebaseInitialized = false;
        let db = null;

        function initializeFirebase() {
            if (firebaseInitialized) return;
            try {
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.database();
                firebaseInitialized = true;
            } catch (e) {
                console.warn("Firebase init failed - using local mode:", e.message);
            }
        }

        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function ParanoiaGame() {
            const [screen, setScreen] = React.useState('landing'); // landing, mode-select, setup, lobby, playing
            const [gameMode, setGameMode] = React.useState(null); // 'local', 'create-online', 'join-online'
            const [players, setPlayers] = React.useState([]);
            const [currentPlayerIdx, setCurrentPlayerIdx] = React.useState(0);
            
            // Replaced single playerName with localPlayerNames array
            const [playerName, setPlayerName] = React.useState(''); 
            const [localPlayerNames, setLocalPlayerNames] = React.useState(['Player 1', 'Player 2', 'Player 3', 'Player 4']);
            
            const [numPlayers, setNumPlayers] = React.useState(4);
            const [onlineRoomCode, setOnlineRoomCode] = React.useState('');
            const [isJoiningRoom, setIsJoiningRoom] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const [playerId, setPlayerId] = React.useState(null);
            const [isHost, setIsHost] = React.useState(false);
            const [currentQuestion, setCurrentQuestion] = React.useState('');
            const [revealed, setRevealed] = React.useState(false);
            const [coinFlipping, setCoinFlipping] = React.useState(false);
            const [coinResult, setCoinResult] = React.useState(null);
            const [gameState, setGameState] = React.useState('setup'); // setup, lobby, playing
            const [isOnline, setIsOnline] = React.useState(false);
            const [maxPlayers, setMaxPlayers] = React.useState(4);

            React.useEffect(() => {
                initializeFirebase();
            }, []);

            // Firebase Listener for Online Syncing
            React.useEffect(() => {
                if (isOnline && onlineRoomCode && db) {
                    const roomRef = db.ref(`rooms/${onlineRoomCode}`);
                    const listener = roomRef.on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            if (data.players) setPlayers(data.players);
                            if (data.gameState) {
                                setGameState(data.gameState);
                                if (data.gameState === 'playing' && screen !== 'playing') setScreen('playing');
                            }
                            if (data.currentQuestion) setCurrentQuestion(data.currentQuestion);
                            if (data.currentPlayerIdx !== undefined) setCurrentPlayerIdx(data.currentPlayerIdx);
                            if (data.coinFlipping !== undefined) setCoinFlipping(data.coinFlipping);
                            if (data.coinResult !== undefined) setCoinResult(data.coinResult);
                            if (data.revealed !== undefined) setRevealed(data.revealed);
                        }
                    });
                    return () => roomRef.off('value', listener);
                }
            }, [isOnline, onlineRoomCode]);

            const getRandomQuestion = () => {
                const allQuestions = Object.values(QUESTIONS).flat();
                return allQuestions[Math.floor(Math.random() * allQuestions.length)];
            };

            const handleGoToModeSelect = () => setScreen('mode-select');
            const handleSelectMode = (mode) => {
                setGameMode(mode);
                setScreen('setup');
            };

            const handleLocalPlayerNameChange = (index, value) => {
                const newNames = [...localPlayerNames];
                newNames[index] = value;
                setLocalPlayerNames(newNames);
            };

            const handleNumLocalPlayersChange = (e) => {
                const num = Math.max(2, parseInt(e.target.value) || 2);
                setNumPlayers(num);
                setLocalPlayerNames(prev => {
                    const newNames = [...prev];
                    while (newNames.length < num) newNames.push(`Player ${newNames.length + 1}`);
                    return newNames.slice(0, num);
                });
            };

            const handleStartLocalGame = () => {
                setLoading(true);
                setTimeout(() => {
                    const newPlayers = localPlayerNames.map((name, i) => ({
                        id: i.toString(),
                        name: name.trim() || `Player ${i + 1}`,
                        isHost: i === 0
                    }));
                    setPlayers(newPlayers);
                    setPlayerId('0');
                    setIsHost(true);
                    setIsOnline(false);
                    setGameState('lobby');
                    setScreen('lobby');
                    setLoading(false);
                }, 500);
            };

            const handleCreateOnlineGame = () => {
                if (!playerName.trim() || !db) return;
                setLoading(true);
                const code = generateRoomCode();
                const newId = Math.random().toString(36).substr(2, 9);
                
                const roomData = {
                    players: [{ id: newId, name: playerName, isHost: true }],
                    gameState: 'lobby',
                    maxPlayers: numPlayers
                };

                db.ref(`rooms/${code}`).set(roomData).then(() => {
                    setOnlineRoomCode(code);
                    setPlayerId(newId);
                    setIsHost(true);
                    setIsOnline(true);
                    setMaxPlayers(numPlayers);
                    setGameState('lobby');
                    setScreen('lobby');
                    setLoading(false);
                });
            };

            const handleJoinOnlineGame = () => {
                if (!playerName.trim() || !onlineRoomCode.trim() || !db) return;
                setIsJoiningRoom(true);
                setLoading(true);
                
                db.ref(`rooms/${onlineRoomCode}`).once('value').then(snap => {
                    if (snap.exists()) {
                        const data = snap.val();
                        if (data.players.length >= data.maxPlayers) {
                            alert('Room is full!');
                            setLoading(false);
                            setIsJoiningRoom(false);
                            return;
                        }
                        
                        const newId = Math.random().toString(36).substr(2, 9);
                        const newPlayers = [...data.players, { id: newId, name: playerName, isHost: false }];
                        
                        db.ref(`rooms/${onlineRoomCode}`).update({ players: newPlayers }).then(() => {
                            setPlayerId(newId);
                            setIsHost(false);
                            setIsOnline(true);
                            setGameState('lobby');
                            setScreen('lobby');
                            setIsJoiningRoom(false);
                            setLoading(false);
                        });
                    } else {
                        alert('Room not found!');
                        setLoading(false);
                        setIsJoiningRoom(false);
                    }
                });
            };

            const handleStartGameSession = () => {
                if (players.length < 2) return;
                const question = getRandomQuestion();
                if (isOnline && db) {
                    db.ref(`rooms/${onlineRoomCode}`).update({
                        gameState: 'playing',
                        currentQuestion: question,
                        currentPlayerIdx: 0,
                        revealed: false,
                        coinResult: null
                    });
                } else {
                    setCurrentQuestion(question);
                    setCurrentPlayerIdx(0);
                    setGameState('playing');
                    setScreen('playing');
                    setRevealed(false);
                    setCoinResult(null);
                }
            };

            const handleFlipCoin = () => {
                if (isOnline && db) {
                    db.ref(`rooms/${onlineRoomCode}`).update({ coinFlipping: true });
                    setTimeout(() => {
                        const result = Math.random() > 0.5 ? 'heads' : 'tails';
                        db.ref(`rooms/${onlineRoomCode}`).update({ 
                            coinResult: result, 
                            coinFlipping: false 
                        });
                    }, 600);
                } else {
                    setCoinFlipping(true);
                    setTimeout(() => {
                        const result = Math.random() > 0.5 ? 'heads' : 'tails';
                        setCoinResult(result);
                        setCoinFlipping(false);
                    }, 600);
                }
            };

            const handleNextRound = () => {
                const question = getRandomQuestion();
                const nextIdx = (currentPlayerIdx + 1) % players.length;
                if (isOnline && db) {
                    db.ref(`rooms/${onlineRoomCode}`).update({
                        currentQuestion: question,
                        currentPlayerIdx: nextIdx,
                        revealed: false,
                        coinResult: null
                    });
                } else {
                    setCurrentQuestion(question);
                    setCurrentPlayerIdx(nextIdx);
                    setRevealed(false);
                    setCoinResult(null);
                }
            };

            const triggerReveal = () => {
                if (isOnline && db) {
                    db.ref(`rooms/${onlineRoomCode}`).update({ revealed: true });
                } else {
                    setRevealed(true);
                }
            }

            const handleBackToLanding = () => {
                setScreen('landing');
                setGameMode(null);
                setGameState('setup');
                setPlayers([]);
                setCurrentPlayerIdx(0);
                setPlayerName('');
                setCurrentQuestion('');
                setRevealed(false);
                setCoinFlipping(false);
                setCoinResult(null);
                setOnlineRoomCode('');
            };

            if (screen === 'landing') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                        <div>
                            <h1 className="font-display text-6xl font-extrabold mb-3 bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">Paranoia</h1>
                            <p className="text-zinc-400 text-lg">The Ultimate Party Game</p>
                        </div>
                        <div className="space-y-4 w-full max-w-xs">
                            <button onClick={handleGoToModeSelect} className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-violet-500/30" style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)" }}>
                                <Zap size={18} /> Play Game
                            </button>
                        </div>
                    </div>
                );
            }

            if (screen === 'mode-select') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                        <h2 className="font-display text-4xl font-extrabold">Choose Mode</h2>
                        <div className="space-y-4 w-full max-w-xs">
                            <button onClick={() => handleSelectMode('local')} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-purple-500/30" style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)" }}>
                                <div className="text-2xl mb-2">🎮</div> Local Game
                            </button>
                            <button onClick={() => handleSelectMode('online')} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-cyan-500/30" style={{ background: "linear-gradient(135deg,#0e7490,#06b6d4)" }}>
                                <div className="text-2xl mb-2">🌐</div> Online Game
                            </button>
                        </div>
                        <button onClick={handleBackToLanding} className="mt-4 text-zinc-400 hover:text-zinc-300 text-sm">Back</button>
                    </div>
                );
            }

            if (screen === 'setup') {
                if (gameMode === 'local') {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8 py-10">
                            <h2 className="font-display text-4xl font-extrabold">Local Game</h2>
                            <div className="w-full max-w-xs space-y-4">
                                <div>
                                    <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Total Players</label>
                                    <input type="number" min="2" max="20" value={numPlayers} onChange={handleNumLocalPlayersChange} className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-violet-500 mb-4" />
                                </div>
                                <div className="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scroll">
                                    {localPlayerNames.map((name, idx) => (
                                        <div key={idx}>
                                            <label className="text-zinc-500 text-xs uppercase tracking-widest font-semibold block mb-1 text-left">Player {idx + 1}</label>
                                            <input type="text" value={name} onChange={(e) => handleLocalPlayerNameChange(idx, e.target.value)} placeholder={`Player ${idx + 1}`} className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-violet-500" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex gap-4 w-full max-w-xs">
                                <button onClick={() => setScreen('mode-select')} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors">Back</button>
                                <button onClick={handleStartLocalGame} disabled={loading} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-violet-600 hover:bg-violet-500 transition-colors disabled:opacity-50">Start Game</button>
                            </div>
                        </div>
                    );
                }

                if (gameMode === 'online') {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                            <h2 className="font-display text-4xl font-extrabold">Online Game</h2>
                            <div className="space-y-4 w-full max-w-xs">
                                <button onClick={() => setGameMode('create-online')} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-cyan-500/30" style={{ background: "linear-gradient(135deg,#0e7490,#06b6d4)" }}>
                                    <div className="text-2xl mb-2">➕</div> Create Room
                                </button>
                                <button onClick={() => setGameMode('join-online')} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-fuchsia-500/30" style={{ background: "linear-gradient(135deg,#be185d,#7c3aed)" }}>
                                    <div className="text-2xl mb-2">🔗</div> Join Room
                                </button>
                            </div>
                            <button onClick={() => setScreen('mode-select')} className="text-zinc-400 hover:text-zinc-300 text-sm">Back</button>
                        </div>
                    );
                }

                if (gameMode === 'create-online') {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                            <h2 className="font-display text-4xl font-extrabold">Create Room</h2>
                            <div className="w-full max-w-xs space-y-4">
                                <div>
                                    <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label>
                                    <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-cyan-500" />
                                </div>
                                <div>
                                    <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Max Players</label>
                                    <input type="number" min="2" max="20" value={numPlayers} onChange={(e) => setNumPlayers(Math.max(2, parseInt(e.target.value) || 2))} className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-cyan-500" />
                                </div>
                            </div>
                            <div className="flex gap-4 w-full max-w-xs">
                                <button onClick={() => setGameMode('online')} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors">Back</button>
                                <button onClick={handleCreateOnlineGame} disabled={!playerName.trim() || loading} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50">Create</button>
                            </div>
                        </div>
                    );
                }

                if (gameMode === 'join-online') {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                            <h2 className="font-display text-4xl font-extrabold">Join Room</h2>
                            <div className="w-full max-w-xs space-y-4">
                                <div>
                                    <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label>
                                    <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-fuchsia-500" />
                                </div>
                                <div>
                                    <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Room Code</label>
                                    <input type="text" value={onlineRoomCode} onChange={(e) => setOnlineRoomCode(e.target.value.toUpperCase())} maxLength="6" className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-center text-lg font-bold focus:outline-none focus:border-fuchsia-500 tracking-widest" />
                                </div>
                            </div>
                            <div className="flex gap-4 w-full max-w-xs">
                                <button onClick={() => setGameMode('online')} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700">Back</button>
                                <button onClick={handleJoinOnlineGame} disabled={!playerName.trim() || !onlineRoomCode.trim() || loading} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-fuchsia-600 hover:bg-fuchsia-500 disabled:opacity-50">Join</button>
                            </div>
                        </div>
                    );
                }
            }

            if (screen === 'lobby') {
                return (
                    <div className="flex flex-col min-h-screen px-6 pt-8 pb-8">
                        <div className="mb-8">
                            <h2 className="font-display text-3xl font-extrabold mb-2">Game Lobby</h2>
                            {onlineRoomCode && (
                                <div className="glass rounded-lg px-4 py-2 inline-flex items-center gap-2 text-sm text-cyan-400 border-zinc-800">
                                    <span className="font-mono font-bold">{onlineRoomCode}</span>
                                </div>
                            )}
                        </div>
                        <div className="flex-1">
                            <h3 className="text-zinc-400 text-xs uppercase tracking-widest font-semibold mb-4">Players ({players.length}/{isOnline ? maxPlayers : players.length})</h3>
                            <div className="space-y-2">
                                {players.map((p) => (
                                    <div key={p.id} className="glass rounded-lg px-4 py-3 flex items-center justify-between border-zinc-800">
                                        <span className="text-white font-medium">{p.name}</span>
                                        {p.isHost && <span className="text-xs bg-violet-950 text-violet-300 px-2 py-1 rounded border border-violet-800 font-semibold">HOST</span>}
                                    </div>
                                ))}
                            </div>
                        </div>
                        {isHost ? (
                            <button onClick={handleStartGameSession} disabled={players.length < 2} className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-violet-500/30 disabled:opacity-50" style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)" }}>
                                <Zap size={16} /> Start Game
                            </button>
                        ) : (
                            <div className="text-center text-zinc-500 text-sm">Waiting for host to start...</div>
                        )}
                    </div>
                );
            }

            if (screen === 'playing') {
                const activePlayer = players[currentPlayerIdx];
                const isMyTurn = !isOnline || playerId === activePlayer?.id;
                const isHostOnlyForNext = !isOnline || isHost;

                if (!coinResult) {
                    return (
                        <>
                            {!coinFlipping ? (
                                <SecretQuestionScreen
                                    asker={activePlayer?.name || 'Unknown'}
                                    question={currentQuestion}
                                    others={players.map(p => p.name).filter(name => name !== activePlayer?.name)}
                                    onFlip={handleFlipCoin}
                                    revealed={revealed}
                                    setRevealed={triggerReveal}
                                    isMyTurn={isMyTurn}
                                />
                            ) : (
                                <CoinScreen flipping={coinFlipping} onFlip={isMyTurn ? handleFlipCoin : undefined} isMyTurn={isMyTurn} />
                            )}
                        </>
                    );
                } else {
                    return (
                        <ResultScreen
                            coinResult={coinResult}
                            question={currentQuestion}
                            asker={activePlayer?.name || 'Unknown'}
                            onNext={handleNextRound}
                            canClickNext={isHostOnlyForNext}
                        />
                    );
                }
            }
        }

        function SecretQuestionScreen({ asker, question, others, onFlip, revealed, setRevealed, isMyTurn }) {
          if (!isMyTurn) {
              return (
                  <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center">
                     <p className="text-zinc-500 text-sm uppercase tracking-widest font-semibold mb-4">Waiting on...</p>
                     <h2 className="font-display text-4xl font-extrabold text-violet-400 mb-8">{asker}</h2>
                     <p className="text-zinc-400 text-sm max-w-xs leading-relaxed">They are reading their secret question and picking someone from the group.</p>
                     <div className="mt-8 animate-pulse text-zinc-600"><EyeOff size={32} className="mx-auto" /></div>
                  </div>
              )
          }

          return (
            <div className="flex flex-col min-h-screen px-6 pt-12 pb-8">
              <div className="glass rounded-xl px-4 py-2 mb-6 self-start flex items-center gap-2 text-xs text-violet-400 border-zinc-800 font-semibold uppercase tracking-widest">
                <Eye size={11} /> Only you, {asker}
              </div>
              <div className="mb-5 flex-1">
                <p className="text-zinc-500 text-xs uppercase tracking-widest mb-1 font-semibold">Your secret question</p>
                <div className="glass-strong rounded-2xl p-5 relative overflow-hidden border-zinc-700">
                  {!revealed && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#0a0a0c]/95 backdrop-blur-md rounded-2xl z-10 cursor-pointer" onClick={() => setRevealed(true)}>
                      <EyeOff size={28} className="text-zinc-600 mb-2" />
                      <span className="text-zinc-500 text-sm">Tap to reveal</span>
                    </div>
                  )}
                  <p className="font-display text-xl font-bold leading-snug text-zinc-100">{question}</p>
                  <div className="mt-3 flex flex-wrap gap-1.5">
                    {others.map((p) => (
                      <span key={p} className="glass text-xs px-2.5 py-1 rounded-full text-fuchsia-400 border-zinc-800 font-medium">{p}</span>
                    ))}
                  </div>
                </div>
              </div>
              <div className="glass rounded-2xl p-4 mb-6 border-zinc-800">
                <h3 className="font-display text-sm font-bold uppercase tracking-widest text-zinc-500 mb-3">How to play</h3>
                <div className="space-y-2.5">
                  {[["1","Read the question above silently."],["2","Answer OUT LOUD to everyone — say a player's name."],["3","Flip the coin to decide if the question gets revealed."]].map(([n,text]) => (
                    <div key={n} className="flex items-start gap-3">
                      <span className="w-5 h-5 rounded-full bg-violet-950 text-violet-400 border border-violet-800 text-xs flex items-center justify-center shrink-0 mt-0.5 font-bold">{n}</span>
                      <span className="text-zinc-400 text-sm leading-relaxed">{text}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="mt-auto">
                <p className="text-center text-zinc-600 text-xs mb-3">Once you've announced your answer…</p>
                <button onClick={onFlip}
                  className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-cyan-500/30"
                  style={{ background: "linear-gradient(135deg,#0e7490,#6d28d9)" }}
                >
                  <Shuffle size={16} /> Flip the Coin
                </button>
              </div>
            </div>
          );
        }

        function CoinScreen({ flipping, onFlip, isMyTurn }) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center">
              <p className="text-zinc-500 text-sm mb-2 uppercase tracking-widest font-semibold">The moment of truth</p>
              <h2 className="font-display text-3xl font-extrabold mb-12 text-zinc-200">
                Heads = <span className="text-cyan-400">Reveal</span><br />
                Tails = <span className="text-fuchsia-400">Secret</span>
              </h2>
              <div onClick={!flipping && isMyTurn ? onFlip : undefined}
                className={`w-44 h-44 rounded-full select-none mb-10 ${isMyTurn && !flipping ? "cursor-pointer active:scale-95" : ""} ${flipping ? "spin-coin" : ""} transition-transform`}
                style={{ background:"linear-gradient(145deg,#d97706,#b45309,#d97706)", boxShadow:"0 0 0 6px rgba(217,119,6,0.1), 0 20px 60px rgba(217,119,6,0.15), inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -4px 6px rgba(0,0,0,0.4)" }}
              >
                <div className="w-full h-full rounded-full flex items-center justify-center">
                  <span className="font-display text-5xl font-extrabold text-amber-950/80">?</span>
                </div>
              </div>
              {!flipping && isMyTurn && (
                <button onClick={onFlip} className="glass-strong px-8 py-3.5 rounded-2xl font-display font-bold uppercase tracking-widest text-sm active:scale-95 transition-all text-amber-400 border-zinc-700">
                  Flip It!
                </button>
              )}
              {flipping && <p className="text-zinc-500 text-sm animate-pulse">Flipping…</p>}
              {!flipping && !isMyTurn && <p className="text-zinc-500 text-sm mt-4">Waiting for them to flip...</p>}
            </div>
          );
        }

        function ResultScreen({ coinResult, question, asker, onNext, canClickNext }) {
          const isHeads = coinResult === "heads";
          return (
            <div className="flex flex-col items-center min-h-screen px-5 pt-14 pb-8 text-center">
              <div className="w-24 h-24 rounded-full flex items-center justify-center mb-5 text-zinc-100"
                style={{ background: isHeads ? "linear-gradient(135deg,#0e7490,#06b6d4)" : "linear-gradient(135deg,#be185d,#7c3aed)", boxShadow: isHeads ? "0 0 40px rgba(6,182,212,0.15)" : "0 0 40px rgba(219,39,119,0.15)" }}>
                {isHeads ? (
                  <Eye size={36} className="text-cyan-100" />
                ) : (
                  <span className="text-3xl font-bold text-fuchsia-100">M</span>
                )}
              </div>
              <div className={`font-display text-5xl font-extrabold mb-2 ${isHeads ? "text-cyan-400" : "text-fuchsia-400"}`}>
                {isHeads ? "HEADS" : "TAILS"}
              </div>
              <div className="font-display text-lg font-bold text-zinc-500 uppercase tracking-widest mb-8">
                {isHeads ? "Question Revealed!" : "Forever a Secret"}
              </div>
              {isHeads ? (
                <div className="glass-strong rounded-2xl p-5 mb-4 w-full text-left border-zinc-700">
                  <p className="text-xs text-zinc-500 uppercase tracking-widest font-semibold mb-2">The question was…</p>
                  <p className="font-display text-lg font-bold leading-snug text-zinc-100">{question}</p>
                  <p className="text-zinc-500 text-sm mt-3">Now everyone knows exactly why <strong className="text-zinc-400">{asker}</strong> said what they said!</p>
                </div>
              ) : (
                <div className="glass rounded-2xl p-5 mb-4 w-full border-zinc-800">
                  <p className="font-display text-base font-bold text-zinc-600 italic mb-1">"What did they mean…?"</p>
                  <p className="text-zinc-600 text-sm"><strong className="text-zinc-500">{asker}</strong> takes the secret to the grave. Stay paranoid.</p>
                </div>
              )}
              <div className="mt-auto w-full">
                {canClickNext ? (
                  <button onClick={onNext}
                    className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-purple-500/30"
                    style={{ background: "linear-gradient(135deg,#6d28d9,#be185d)" }}
                  >
                    Next Round <ChevronRight size={16} />
                  </button>
                ) : (
                  <p className="text-zinc-500 text-sm">Waiting for the host to start the next round...</p>
                )}
              </div>
            </div>
          );
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParanoiaGame />);
    </script>
</body>
</html>
