<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranoia - The Ultimate Party Game</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase 9.22.2 SDK (Compat version - works reliably) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideOutDown { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }
        .page-enter { animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .page-exit { animation: slideOutDown 0.3s ease-out; }

        @keyframes spin-coin {
            0% { transform: rotateY(0) rotateX(0) scale(1); }
            25% { transform: rotateY(180deg) rotateX(90deg) scale(1.05); }
            50% { transform: rotateY(360deg) rotateX(180deg) scale(1); }
            75% { transform: rotateY(540deg) rotateX(270deg) scale(1.05); }
            100% { transform: rotateY(720deg) rotateX(360deg) scale(1); }
        }
        .spin-coin {
            animation: spin-coin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.4); }
            50% { box-shadow: 0 0 40px rgba(167, 139, 250, 0.8); }
        }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

        @keyframes stagger-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-item { animation: stagger-in 0.3s ease-out backwards; }

        @keyframes reveal {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .reveal-in { animation: reveal 0.3s ease-out; }

        @keyframes spin-loader {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin-loader { animation: spin-loader 1s linear infinite; }

        .glass {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .glass-strong {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(63, 63, 70, 0.6);
        }

        .player-card { transition: all 0.3s ease; }
        .player-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(139, 92, 246, 0.2); }

        .badge-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const QUESTIONS = {
            icebreaker: [
                "Which player do you think is the most fun to be around?",
                "Who has the best fashion sense in the group?",
                "Who is most likely to cry during a sad movie?",
                "Who do you think is the best-dressed here?",
                "Who is the least likely to be up for a spontaneous plan?",
                "Who is most likely to become a social media influencer?",
                "Which player has the best sense of humor?",
                "Who tells the best dad jokes?",
                "Who do you think has the most controversial food opinions?",
                "Who is most likely to volunteer as tribute in the Hunger Games?",
                "Who in this room do you trust the most?",
                "Who always has the best advice during a crisis?",
                "Who is the unsung soldier holding the group together?",
                "Which member in the group has grown the most in the past year?",
                "Who do you think will be the most successful in 10 years?",
                "Who here deserves more appreciation and recognition from the group?",
            ],
            funny: [
                "Who is most likely to get lost even with a GPS?",
                "Who's most likely to be late for a plan because they stopped to pet a dog?",
                "Who do you think has the most embarrassing Spotify playlists?",
                "Who is guilty of never matching their socks?",
                "Who should have a reality TV show based on their life?",
                "Who would accidentally send a text to the wrong person?",
                "Who do you think has the highest alcohol tolerance?",
                "Which member has the best dance moves when drunk?",
                "Who do you think is the life of the party?",
                "Which player throws the best parties?",
                "Who is most likely to start a conga line?",
            ],
            devious: [
                "Who is most likely to scam you?",
                "Who would be the scariest as a villain?",
                "Who is most likely to steal your fries?",
                "Who would make the best con artist?",
                "Who would backstab you for a million dollars?",
                "Who is most likely to start drama?",
                "Who would be the worst person to keep a secret with?",
            ],
            adult: [
                "Who would you most want to see in a reality dating show?",
                "Who has the worst taste in romantic partners?",
                "Who do you think has been on the most dates?",
                "Who's most likely to get drunk and cry about their ex?",
                "Who would be most likely to message an ex at 2am?",
                "Who's the biggest player in this group?",
                "Who would be most likely to have an embarrassing dating story?",
                "Who's most likely to fall in love too quickly?",
                "Who would make the worst kisser?",
                "Who's most likely to ghost someone?",
                "Who would be the worst person to bring home to your parents?",
                "Who's most likely to send a risky text to the wrong person?",
            ],
        };

        // Simple Firebase wrapper
        let db = null;
        let firebaseReady = false;

        function waitForFirebase() {
            return new Promise((resolve) => {
                if (window.firebase) {
                    if (!firebaseReady) {
                        try {
                            firebase.initializeApp({
                                apiKey: "AIzaSyDBx9ooN1RNK1vsNyrNgC-4B-ePy9VIjfM",
                                authDomain: "paranoia-game-549b9.firebaseapp.com",
                                projectId: "paranoia-game-549b9",
                                databaseURL: "https://paranoia-game-549b9-default-rtdb.europe-west1.firebasedatabase.app",
                                storageBucket: "paranoia-game-549b9.firebasestorage.app",
                                messagingSenderId: "426674405580",
                                appId: "1:426674405580:web:ac092ca343c83d572ec269",
                                measurementId: "G-YYDD8JJBJG"
                            });
                            db = firebase.database();
                            firebaseReady = true;
                            console.log("✓ Firebase initialized successfully");
                        } catch (e) {
                            if (e.code !== 'app/duplicate-app') {
                                console.warn("Firebase init issue:", e.message);
                            }
                            db = firebase.database();
                            firebaseReady = true;
                        }
                    }
                    resolve(db);
                } else {
                    setTimeout(() => waitForFirebase().then(resolve), 100);
                }
            });
        }

        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Icons
        function Plus({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>; }
        function Trash2({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>; }
        function Eye({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>; }
        function EyeOff({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.578 1 1 0 0 1 0 .696"/><path d="M14.084 9.415a3 3 0 0 0-4.669 4.11"/><path d="m2 2 20 20"/><path d="M4.532 4.532A10.738 10.738 0 0 0 2.062 11.65 1 1 0 0 0 2.062 12.35 10.75 10.75 0 0 0 13.816 19.094"/></svg>; }
        function ChevronRight({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m9 18 6-6-6-6"/></svg>; }
        function Zap({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m13 2-2 10h9L9 22l2-10H2Z"/></svg>; }
        function Shuffle({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.2 0 2.3.6 3 1.7l1.1 1.6"/><path d="m15.4 12.8 1.2 1.7c.8 1.1 2 1.7 3.2 1.7H22"/><path d="m18 14 4 4-4 4"/></svg>; }
        function Copy({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>; }
        function LogOut({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>; }
        function Loader({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin-loader"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/></svg>; }
        function Users({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>; }
        function Check({ size = 16 }) { return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 6 9 17l-5-5"/></svg>; }

        function StaggerItem({ index, children, delay = 50 }) {
            return <div style={{ animationDelay: `${index * delay}ms` }} className="stagger-item">{children}</div>;
        }

        function ParanoiaGame() {
            const [appScreen, setAppScreen] = React.useState('landing');
            const [gameMode, setGameMode] = React.useState(null);
            const [players, setPlayers] = React.useState([]);
            const [currentPlayerIdx, setCurrentPlayerIdx] = React.useState(0);
            const [playerName, setPlayerName] = React.useState('');
            const [numPlayers, setNumPlayers] = React.useState(4);
            const [playerNames, setPlayerNames] = React.useState([]);
            const [onlineRoomCode, setOnlineRoomCode] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [playerId, setPlayerId] = React.useState(null);
            const [isHost, setIsHost] = React.useState(false);
            const [currentQuestion, setCurrentQuestion] = React.useState('');
            const [revealed, setRevealed] = React.useState(false);
            const [coinFlipping, setCoinFlipping] = React.useState(false);
            const [coinResult, setCoinResult] = React.useState(null);
            const [gameState, setGameState] = React.useState('setup');
            const [isOnline, setIsOnline] = React.useState(false);
            const [maxPlayers, setMaxPlayers] = React.useState(4);
            const [fadeOut, setFadeOut] = React.useState(false);
            const [firebaseStatus, setFirebaseStatus] = React.useState('loading');
            const [selectedCategories, setSelectedCategories] = React.useState(['icebreaker', 'funny', 'devious']);
            const [nextRoundLoading, setNextRoundLoading] = React.useState(false);
            const roomRefRef = React.useRef(null);
            const reconnectingRef = React.useRef(false);
            const [nextRoundPending, setNextRoundPending] = React.useState(false);

            React.useEffect(() => {
                waitForFirebase().then(() => {
                    setFirebaseStatus('ready');
                    console.log("✓ Firebase ready for use");
                });
            }, []);

            // Firebase sync for multiplayer
            React.useEffect(() => {
                if (!isOnline || !onlineRoomCode || !db) return;

                const roomRef = db.ref(`rooms/${onlineRoomCode}`);
                roomRefRef.current = roomRef;

                const onValue = (snapshot) => {
                    const roomData = snapshot.val();
                    if (roomData && roomData.players) {
                        const playersList = Object.values(roomData.players).filter(p => p !== null);
                        setPlayers(playersList);
                        
                        // Sync game state
                        if (roomData.gameState) setGameState(roomData.gameState);
                        if (roomData.currentPlayerIdx !== undefined) setCurrentPlayerIdx(roomData.currentPlayerIdx);
                        if (roomData.currentQuestion) setCurrentQuestion(roomData.currentQuestion);
                        if (roomData.coinFlipping !== undefined) setCoinFlipping(roomData.coinFlipping);
                        if (roomData.coinResult) setCoinResult(roomData.coinResult);
                        if (roomData.selectedCategories) {
                            setSelectedCategories(roomData.selectedCategories);
                        }
                    }
                };

                roomRef.on('value', onValue);
                return () => roomRef.off('value', onValue);
            }, [isOnline, onlineRoomCode]);

            const updateRoomData = (updates) => {
                if (!isOnline || !onlineRoomCode || !db) return;
                db.ref(`rooms/${onlineRoomCode}`).update(updates).catch(err => {
                    console.warn("Update failed:", err.message);
                });
            };

            const getRandomQuestion = () => {
                const allQuestions = selectedCategories.flatMap(cat => QUESTIONS[cat] || []);
                if (allQuestions.length === 0) return "No categories selected!";
                return allQuestions[Math.floor(Math.random() * allQuestions.length)];
            };

            const navigateTo = (screen) => {
                setFadeOut(true);
                setTimeout(() => {
                    setAppScreen(screen);
                    setFadeOut(false);
                }, 200);
            };

            const handleStartLocalGame = () => {
                if (!playerName.trim()) return;
                setLoading(true);
                setTimeout(() => {
                    const newPlayers = playerNames.map((name, i) => ({
                        id: i.toString(),
                        name: name || `Player ${i + 1}`,
                        isHost: i === 0
                    }));
                    setPlayers(newPlayers);
                    setPlayerId('0');
                    setIsHost(true);
                    setIsOnline(false);
                    setGameState('category-select');
                    setLoading(false);
                }, 500);
            };

            const handleCreateOnlineGame = () => {
                if (!playerName.trim()) return;
                
                if (!db) {
                    alert("Firebase not ready yet. Please wait and try again.");
                    return;
                }

                setLoading(true);
                const code = generateRoomCode();
                const newId = Math.random().toString(36).substr(2, 9);
                const timestamp = Date.now();
                
                const initialData = {
                    code: code,
                    hostId: newId,
                    maxPlayers: numPlayers,
                    createdAt: timestamp,
                    gameState: 'category-select',
                    players: {
                        [newId]: { id: newId, name: playerName, isHost: true }
                    },
                    selectedCategories: ['icebreaker', 'funny', 'devious']
                };
                
                db.ref(`rooms/${code}`).set(initialData).then(() => {
                    console.log("✓ Room created:", code);
                    setTimeout(() => {
                        setOnlineRoomCode(code);
                        setPlayerId(newId);
                        setIsHost(true);
                        setPlayers([{ id: newId, name: playerName, isHost: true }]);
                        setIsOnline(true);
                        setMaxPlayers(numPlayers);
                        setGameState('category-select');
                        setSelectedCategories(['icebreaker', 'funny', 'devious']);
                        setLoading(false);
                    }, 300);
                }).catch(err => {
                    console.error("✗ Create room failed:", err.message);
                    alert(`Failed to create room: ${err.message}`);
                    setLoading(false);
                });
            };

            const handleJoinOnlineGame = () => {
                if (!playerName.trim() || !onlineRoomCode.trim()) {
                    alert('Please enter your name and room code');
                    return;
                }

                if (!db) {
                    alert("Firebase not ready yet. Please wait and try again.");
                    return;
                }

                setLoading(true);
                db.ref(`rooms/${onlineRoomCode.trim()}`).once('value', (snapshot) => {
                    if (!snapshot.exists()) {
                        alert('Room not found. Check the code.');
                        setLoading(false);
                        return;
                    }

                    const roomData = snapshot.val();
                    const currentPlayers = Object.values(roomData.players || {}).filter(p => p !== null);

                    if (currentPlayers.length >= roomData.maxPlayers) {
                        alert('Room is full!');
                        setLoading(false);
                        return;
                    }

                    const newId = Math.random().toString(36).substr(2, 9);
                    const newPlayer = { id: newId, name: playerName, isHost: false };

                    db.ref(`rooms/${onlineRoomCode.trim()}/players/${newId}`).set(newPlayer).then(() => {
                        console.log("✓ Joined room:", onlineRoomCode.trim());
                        setTimeout(() => {
                            setOnlineRoomCode(onlineRoomCode.trim());
                            setPlayerId(newId);
                            setIsHost(false);
                            setPlayers([...currentPlayers, newPlayer]);
                            setIsOnline(true);
                            setMaxPlayers(roomData.maxPlayers);
                            // Set game state based on room state
                            setGameState(roomData.gameState || 'category-select');
                            if (roomData.selectedCategories) {
                                setSelectedCategories(roomData.selectedCategories);
                            }
                            if (roomData.currentQuestion) {
                                setCurrentQuestion(roomData.currentQuestion);
                            }
                            if (roomData.currentPlayerIdx !== undefined) {
                                setCurrentPlayerIdx(roomData.currentPlayerIdx);
                            }
                            if (roomData.coinResult) {
                                setCoinResult(roomData.coinResult);
                            }
                            setLoading(false);
                        }, 300);
                    }).catch(err => {
                        console.error("✗ Join failed:", err.message);
                        alert(`Failed to join: ${err.message}`);
                        setLoading(false);
                    });
                }).catch(err => {
                    console.error("✗ Get room failed:", err.message);
                    alert(`Connection error: ${err.message}`);
                    setLoading(false);
                });
            };

            const handleStartGameSession = () => {
                if (players.length < 2) {
                    alert('Need at least 2 players');
                    return;
                }
                const question = getRandomQuestion();
                setCurrentQuestion(question);
                setCurrentPlayerIdx(0);
                setGameState('playing');
                setCoinResult(null);
                setRevealed(false);
                
                if (isOnline && onlineRoomCode) {
                    updateRoomData({
                        gameState: 'playing',
                        currentPlayerIdx: 0,
                        currentQuestion: question,
                        coinResult: null,
                        coinFlipping: false
                    });
                }
            };

            const handleFlipCoin = () => {
                setCoinFlipping(true);
                if (isOnline && onlineRoomCode) {
                    updateRoomData({ coinFlipping: true });
                }
                setTimeout(() => {
                    const result = Math.random() > 0.5 ? 'heads' : 'tails';
                    setCoinResult(result);
                    setCoinFlipping(false);
                    if (isOnline && onlineRoomCode) {
                        updateRoomData({ coinFlipping: false, coinResult: result });
                    }
                }, 1000);
            };

            const handleNextRound = () => {
                // Prevent multiple clicks while transition is pending
                if (nextRoundPending) return;
                
                // Only host or host-equivalent can advance
                if (isOnline && !isHost) return;
                
                setNextRoundPending(true);
                const question = getRandomQuestion();
                const nextIdx = (currentPlayerIdx + 1) % players.length;
                setCurrentQuestion(question);
                setCurrentPlayerIdx(nextIdx);
                setRevealed(false);
                setCoinResult(null);
                setCoinFlipping(false);
                
                if (isOnline && onlineRoomCode) {
                    updateRoomData({
                        currentPlayerIdx: nextIdx,
                        currentQuestion: question,
                        coinResult: null,
                        coinFlipping: false
                    });
                }
                
                // Reset after a short delay to prevent rapid clicks
                setTimeout(() => setNextRoundPending(false), 500);
            };

            const handleBackToLanding = () => {
                if (isOnline && onlineRoomCode && playerId && db) {
                    db.ref(`rooms/${onlineRoomCode}/players/${playerId}`).set(null);
                }
                if (roomRefRef.current) {
                    roomRefRef.current.off();
                }
                navigateTo('landing');
                setGameMode(null);
                setGameState('setup');
                setPlayers([]);
                setPlayerName('');
                setPlayerNames([]);
                setOnlineRoomCode('');
                setCoinResult(null);
                setCurrentQuestion('');
                setSelectedCategories(['icebreaker', 'funny', 'devious']);
            };

            const containerClass = fadeOut ? 'opacity-0 transition-opacity duration-200' : 'opacity-100 transition-opacity duration-300 page-enter';

            // Landing
            if (appScreen === 'landing') {
                return (
                    <div className={containerClass}>
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                            <div>
                                <h1 className="font-display text-6xl font-extrabold mb-3 bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">Paranoia</h1>
                                <p className="text-zinc-400 text-lg">The Ultimate Party Game</p>
                            </div>
                            <button onClick={() => navigateTo('mode-select')} className="w-full max-w-xs py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-violet-500/30" style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)" }}>
                                <Zap size={18} /> Play Game
                            </button>
                            <p className="text-zinc-500 text-sm max-w-sm">Play with friends online or locally. Ask anonymously, guess carefully.</p>
                        </div>
                    </div>
                );
            }

            // Mode Select
            if (appScreen === 'mode-select') {
                return (
                    <div className={containerClass}>
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                            <h2 className="font-display text-4xl font-extrabold">Choose Game Mode</h2>
                            <div className="space-y-4 w-full max-w-xs">
                                <StaggerItem index={0}>
                                    <button onClick={() => { setGameMode('local'); navigateTo('setup'); }} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-purple-500/30" style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)" }}>
                                        <div className="text-2xl mb-2">🎮</div>Local Game
                                    </button>
                                </StaggerItem>
                                <StaggerItem index={1}>
                                    <button onClick={() => { setGameMode('online'); navigateTo('setup'); }} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-cyan-500/30" style={{ background: "linear-gradient(135deg,#0e7490,#06b6d4)" }}>
                                        <div className="text-2xl mb-2">🌐</div>Online Game {firebaseStatus !== 'ready' && <div className="text-xs mt-1">🔄 Initializing...</div>}
                                    </button>
                                </StaggerItem>
                            </div>
                            <button onClick={() => navigateTo('landing')} className="text-zinc-400 hover:text-zinc-300 text-sm">← Back</button>
                        </div>
                    </div>
                );
            }

            // Setup
            if (appScreen === 'setup' && gameState === 'setup') {
                if (gameMode === 'local') {
                    return (
                        <div className={containerClass}>
                            <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                                <h2 className="font-display text-4xl font-extrabold">Local Game Setup</h2>
                                <div className="w-full max-w-md space-y-5">
                                    <div>
                                        <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label>
                                        <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} placeholder="Enter your name" className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-violet-500" />
                                    </div>
                                    <div>
                                        <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Number of Players ({numPlayers})</label>
                                        <input type="range" min="2" max="20" value={numPlayers} onChange={(e) => { const num = parseInt(e.target.value); setNumPlayers(num); setPlayerNames([...Array(num)].map((_, i) => i === 0 ? playerName : '')); }} className="w-full" />
                                    </div>
                                    {numPlayers > 1 && (
                                        <div className="mt-6 pt-6 border-t border-zinc-700">
                                            <p className="text-zinc-400 text-sm uppercase tracking-widest font-semibold mb-3">Optional: Set Player Names</p>
                                            <div className="space-y-2 max-h-48 overflow-y-auto">
                                                {Array.from({ length: numPlayers }).map((_, i) => (
                                                    <div key={i} className="flex items-center gap-2">
                                                        <span className="text-zinc-600 text-sm w-8">P{i + 1}</span>
                                                        <input type="text" value={playerNames[i] || ''} onChange={(e) => { const newNames = [...playerNames]; newNames[i] = e.target.value; setPlayerNames(newNames); }} placeholder={i === 0 ? playerName : `Player ${i + 1}`} className="flex-1 px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-white text-sm focus:outline-none focus:border-violet-500" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-4 w-full max-w-xs">
                                    <button onClick={() => { setGameMode(null); navigateTo('mode-select'); }} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors">Back</button>
                                    <button onClick={handleStartLocalGame} disabled={!playerName.trim() || loading} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-violet-600 hover:bg-violet-500 transition-colors disabled:opacity-50 flex items-center justify-center gap-2">{loading ? <><Loader size={14} /> Starting...</> : 'Start Game'}</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (gameMode === 'online') {
                    return (
                        <div className={containerClass}>
                            <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                                <h2 className="font-display text-4xl font-extrabold">Online Game</h2>
                                <div className="space-y-4 w-full max-w-xs">
                                    <StaggerItem index={0}>
                                        <button onClick={() => { setGameMode('create-online'); }} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-cyan-500/30" style={{ background: "linear-gradient(135deg,#0e7490,#06b6d4)" }}>
                                            <div className="text-2xl mb-2">➕</div>Create Room
                                        </button>
                                    </StaggerItem>
                                    <StaggerItem index={1}>
                                        <button onClick={() => { setGameMode('join-online'); }} className="w-full py-6 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all border border-fuchsia-500/30" style={{ background: "linear-gradient(135deg,#be185d,#7c3aed)" }}>
                                            <div className="text-2xl mb-2">🔗</div>Join Room
                                        </button>
                                    </StaggerItem>
                                </div>
                                <button onClick={() => { setGameMode('online'); navigateTo('mode-select'); }} className="text-zinc-400 hover:text-zinc-300 text-sm">← Back</button>
                            </div>
                        </div>
                    );
                }

                if (gameMode === 'create-online') {
                    return (
                        <div className={containerClass}>
                            <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                                <h2 className="font-display text-4xl font-extrabold">Create Online Room</h2>
                                <div className="w-full max-w-xs space-y-4">
                                    <div><label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label><input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} placeholder="Enter your name" className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-cyan-500" /></div>
                                    <div><label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Max Players ({numPlayers})</label><input type="range" min="2" max="20" value={numPlayers} onChange={(e) => setNumPlayers(parseInt(e.target.value))} className="w-full" /></div>
                                </div>
                                <div className="flex gap-4 w-full max-w-xs">
                                    <button onClick={() => setGameMode('online')} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors">Back</button>
                                    <button onClick={handleCreateOnlineGame} disabled={!playerName.trim() || loading || firebaseStatus !== 'ready'} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-cyan-600 hover:bg-cyan-500 transition-colors disabled:opacity-50 flex items-center justify-center gap-2">{loading ? <><Loader size={14} /> Creating...</> : 'Create'}</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (gameMode === 'join-online') {
                    return (
                        <div className={containerClass}>
                            <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                                <h2 className="font-display text-4xl font-extrabold">Join Online Room</h2>
                                <div className="w-full max-w-xs space-y-4">
                                    <div><label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label><input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} placeholder="Enter your name" className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-fuchsia-500" /></div>
                                    <div><label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Room Code</label><input type="text" value={onlineRoomCode} onChange={(e) => setOnlineRoomCode(e.target.value.toUpperCase())} placeholder="e.g., ABC123" maxLength="6" className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-center text-lg font-bold focus:outline-none focus:border-fuchsia-500 tracking-widest" /></div>
                                </div>
                                <div className="flex gap-4 w-full max-w-xs">
                                    <button onClick={() => setGameMode('online')} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors">Back</button>
                                    <button onClick={handleJoinOnlineGame} disabled={!playerName.trim() || !onlineRoomCode.trim() || loading || firebaseStatus !== 'ready'} className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-fuchsia-600 hover:bg-fuchsia-500 transition-colors disabled:opacity-50 flex items-center justify-center gap-2">{loading ? <><Loader size={14} /> Joining...</> : 'Join'}</button>
                                </div>
                            </div>
                        </div>
                    );
                }
            }

            // Category Select
            if (gameState === 'category-select') {
                const categories = [
                    { id: 'icebreaker', name: '😊 Icebreaker', description: 'Friendly & fun questions', color: 'violet' },
                    { id: 'funny', name: '😂 Funny', description: 'Hilarious moments', color: 'cyan' },
                    { id: 'devious', name: '😈 Devious', description: 'Spicy & scandalous', color: 'pink' },
                    { id: 'adult', name: '🔥 18+', description: 'For mature audiences only', color: 'red' },
                ];

                const handleCategoryToggle = (catId) => {
                    const newCategories = selectedCategories.includes(catId)
                        ? selectedCategories.filter(c => c !== catId)
                        : [...selectedCategories, catId];
                    setSelectedCategories(newCategories);
                    
                    // Sync to Firebase if online
                    if (isOnline && onlineRoomCode && isHost) {
                        updateRoomData({ selectedCategories: newCategories });
                    }
                };

                return (
                    <div className={containerClass}>
                        <div className="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">
                            <div>
                                <h2 className="font-display text-4xl font-extrabold mb-2">Select Question Categories</h2>
                                <p className="text-zinc-400 text-sm">Choose which types of questions to play with</p>
                            </div>

                            <div className="space-y-3 w-full max-w-md">
                                {categories.map((cat, idx) => (
                                    <StaggerItem key={cat.id} index={idx}>
                                        <button
                                            onClick={() => handleCategoryToggle(cat.id)}
                                            disabled={!isHost && isOnline}
                                            className={`w-full py-4 rounded-xl border-2 transition-all text-left font-display font-bold uppercase tracking-widest disabled:opacity-50 disabled:cursor-not-allowed ${
                                                selectedCategories.includes(cat.id)
                                                    ? cat.color === 'violet' ? 'border-violet-500 bg-violet-950/50' : cat.color === 'cyan' ? 'border-cyan-500 bg-cyan-950/50' : cat.color === 'pink' ? 'border-pink-500 bg-pink-950/50' : 'border-red-500 bg-red-950/50'
                                                    : 'border-zinc-700 bg-zinc-900/30'
                                            }`}
                                        >
                                            <div className="flex items-center justify-between px-4">
                                                <div>
                                                    <div className="text-base">{cat.name}</div>
                                                    <div className="text-xs text-zinc-400 font-normal normal-case">{cat.description}</div>
                                                </div>
                                                <div className={`w-6 h-6 rounded border-2 flex items-center justify-center transition-all ${
                                                    selectedCategories.includes(cat.id)
                                                        ? cat.color === 'violet' ? 'bg-violet-500 border-violet-500' : cat.color === 'cyan' ? 'bg-cyan-500 border-cyan-500' : cat.color === 'pink' ? 'bg-pink-500 border-pink-500' : 'bg-red-500 border-red-500'
                                                        : 'border-zinc-600'
                                                }`}>
                                                    {selectedCategories.includes(cat.id) && <Check size={14} className="text-white" />}
                                                </div>
                                            </div>
                                        </button>
                                    </StaggerItem>
                                ))}
                            </div>

                            <div className="flex gap-4 w-full max-w-md">
                                <button
                                    onClick={() => {
                                        if (isOnline && onlineRoomCode && playerId && db) {
                                            db.ref(`rooms/${onlineRoomCode}/players/${playerId}`).set(null);
                                        }
                                        handleBackToLanding();
                                    }}
                                    className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors"
                                >
                                    Back
                                </button>
                                <button
                                    onClick={() => {
                                        if (selectedCategories.length === 0) {
                                            alert('Please select at least one category');
                                            return;
                                        }
                                        if (isOnline && onlineRoomCode && isHost) {
                                            updateRoomData({ selectedCategories: selectedCategories, gameState: 'lobby' });
                                        }
                                        setGameState('lobby');
                                    }}
                                    disabled={!isHost && isOnline}
                                    className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-purple-600 hover:bg-purple-500 transition-colors disabled:opacity-50 flex items-center justify-center gap-2"
                                >
                                    Continue <ChevronRight size={14} />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Lobby
            if (gameState === 'lobby') {
                return (
                    <div className={containerClass}>
                        <div className="flex flex-col min-h-screen px-6 pt-8 pb-8">
                            <div className="mb-8">
                                <h2 className="font-display text-3xl font-extrabold mb-2">Game Lobby</h2>
                                {onlineRoomCode && (
                                    <div>
                                        <div className="glass rounded-lg px-4 py-2 inline-flex items-center gap-2 text-sm text-cyan-400 border-zinc-800 badge-pulse">
                                            <span className="font-mono font-bold text-lg">{onlineRoomCode}</span>
                                            <button onClick={() => navigator.clipboard.writeText(onlineRoomCode)} className="hover:text-cyan-300 transition-colors"><Copy size={14} /></button>
                                        </div>
                                        <div className="mt-2 text-xs text-green-600 bg-green-950/40 border border-green-800 rounded px-3 py-2">
                                            ✓ Connected - players syncing live
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="flex-1">
                                <h3 className="text-zinc-400 text-xs uppercase tracking-widest font-semibold mb-4">Players ({players.length}/{maxPlayers})</h3>
                                <div className="space-y-2">
                                    {players.length === 0 ? <div className="text-zinc-500 text-sm py-4 text-center">Waiting for players...</div> : players.map((p, idx) => (
                                        <StaggerItem key={p.id} index={idx}>
                                            <div className="glass player-card rounded-lg px-4 py-3 flex items-center justify-between border-zinc-800">
                                                <span className="text-white font-medium">{p.name}</span>
                                                {p.isHost && <span className="text-xs bg-violet-950 text-violet-300 px-3 py-1 rounded border border-violet-800 font-semibold">HOST</span>}
                                            </div>
                                        </StaggerItem>
                                    ))}
                                </div>
                            </div>
                            <div className="mt-auto pt-6 space-y-3">
                                {isHost && <button onClick={handleStartGameSession} disabled={players.length < 2} className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-violet-500/30 hover:border-violet-500/60 disabled:opacity-50" style={{ background: "linear-gradient(135deg,#6d28d9,#7c3aed)" }}><Zap size={16} /> Start Game</button>}
                                {!isHost && <div className="text-center text-zinc-500 text-sm py-4"><Loader size={16} className="inline mr-2" />Waiting for host to start...</div>}
                                <button onClick={handleBackToLanding} className="w-full py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors flex items-center justify-center gap-2"><LogOut size={14} /> Leave Game</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Playing
            if (gameState === 'playing') {
                const isCurrentPlayer = playerId === players[currentPlayerIdx]?.id;

                if (!coinResult) {
                    if (isCurrentPlayer) {
                        // Current player sees the question
                        return (
                            <>
                                {!coinFlipping ? (
                                    <div className="page-enter flex flex-col min-h-screen px-6 pt-12 pb-8">
                                        <div className="glass rounded-xl px-4 py-2 mb-6 self-start flex items-center gap-2 text-xs text-violet-400 border-zinc-800 font-semibold uppercase tracking-widest">
                                            <Eye size={11} /> Only you
                                        </div>
                                        <div className="mb-5 flex-1">
                                            <p className="text-zinc-500 text-xs uppercase tracking-widest mb-1 font-semibold">Your secret question</p>
                                            <div className="glass-strong rounded-2xl p-5 relative overflow-hidden border-zinc-700">
                                                {!revealed && <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#0a0a0c]/95 backdrop-blur-md rounded-2xl z-10 cursor-pointer hover:bg-[#0a0a0c]/90 transition-colors" onClick={() => setRevealed(true)}><EyeOff size={28} className="text-zinc-600 mb-2" /><span className="text-zinc-500 text-sm">Tap to reveal</span></div>}
                                                <p className={`font-display text-xl font-bold leading-snug text-zinc-100 ${revealed ? 'reveal-in' : ''}`}>{currentQuestion}</p>
                                                <div className="mt-3 flex flex-wrap gap-1.5">
                                                    {players.map((p, i) => i !== currentPlayerIdx && <span key={p.id} className="glass text-xs px-2.5 py-1 rounded-full text-fuchsia-400 border-zinc-800 font-medium">{p.name}</span>)}
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={handleFlipCoin} className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-cyan-500/30 hover:border-cyan-500/60" style={{ background: "linear-gradient(135deg,#0e7490,#6d28d9)" }}><Shuffle size={16} /> Flip the Coin</button>
                                    </div>
                                ) : (
                                    <div className="page-enter flex flex-col items-center justify-center min-h-screen px-6 text-center">
                                        <p className="text-zinc-500 text-sm mb-2 uppercase tracking-widest font-semibold">The moment of truth</p>
                                        <h2 className="font-display text-3xl font-extrabold mb-12 text-zinc-200">Heads = <span className="text-cyan-400">Reveal</span><br />Tails = <span className="text-fuchsia-400">Secret</span></h2>
                                        <div className="w-44 h-44 rounded-full cursor-pointer select-none mb-10 spin-coin" style={{ background:"linear-gradient(145deg,#d97706,#b45309,#d97706)", boxShadow:"0 0 0 6px rgba(217,119,6,0.1), 0 20px 60px rgba(217,119,6,0.15), inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -4px 6px rgba(0,0,0,0.4)" }}><div className="w-full h-full rounded-full flex items-center justify-center"><span className="font-display text-5xl font-extrabold text-amber-950/80">?</span></div></div>
                                        <p className="text-zinc-500 text-sm animate-pulse">Flipping…</p>
                                    </div>
                                )}
                            </>
                        );
                    } else {
                        // Other players wait and don't see the question
                        return (
                            <div className="page-enter flex flex-col items-center justify-center min-h-screen px-6 text-center">
                                <div className="mb-8">
                                    <div className="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center mb-6 mx-auto">
                                        <Users size={32} className="text-white" />
                                    </div>
                                    <h2 className="font-display text-4xl font-extrabold mb-3">It's {players[currentPlayerIdx]?.name}'s Turn</h2>
                                    <p className="text-zinc-400 text-lg mb-2">🤐 The question is hidden</p>
                                    <p className="text-zinc-500 text-sm max-w-sm mx-auto">Wait for them to answer, then we'll flip the coin to see if the question gets revealed...</p>
                                </div>
                                <div className="mt-12 space-y-2 w-full max-w-xs">
                                    {!coinFlipping && coinResult === null && (
                                        <div className="text-zinc-600 text-sm py-4 flex items-center justify-center gap-2">
                                            <Loader size={16} /> Waiting for coin flip...
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    }
                } else {
                    const isHeads = coinResult === "heads";
                    return (
                        <div className="page-enter flex flex-col items-center min-h-screen px-5 pt-14 pb-8 text-center">
                            <div className="w-24 h-24 rounded-full flex items-center justify-center mb-5 text-zinc-100 reveal-in" style={{ background: isHeads ? "linear-gradient(135deg,#0e7490,#06b6d4)" : "linear-gradient(135deg,#be185d,#7c3aed)", boxShadow: isHeads ? "0 0 40px rgba(6,182,212,0.15)" : "0 0 40px rgba(219,39,119,0.15)" }}>
                                {isHeads ? <Eye size={36} className="text-cyan-100" /> : <span className="text-3xl font-bold text-fuchsia-100">M</span>}
                            </div>
                            <div className={`font-display text-5xl font-extrabold mb-2 ${isHeads ? "text-cyan-400" : "text-fuchsia-400"}`}>{isHeads ? "HEADS" : "TAILS"}</div>
                            <div className="font-display text-lg font-bold text-zinc-500 uppercase tracking-widest mb-8">{isHeads ? "Question Revealed!" : "Forever a Secret"}</div>
                            {isHeads ? (
                                <div className="glass-strong rounded-2xl p-5 mb-4 w-full text-left border-zinc-700 reveal-in max-w-sm">
                                    <p className="text-xs text-zinc-500 uppercase tracking-widest font-semibold mb-2">The question was…</p>
                                    <p className="font-display text-lg font-bold leading-snug text-zinc-100">{currentQuestion}</p>
                                </div>
                            ) : (
                                <div className="glass rounded-2xl p-5 mb-4 w-full text-left border-zinc-800 reveal-in max-w-sm">
                                    <p className="font-display text-base font-bold text-zinc-600 italic mb-1">"What did they mean…?"</p>
                                    <p className="text-zinc-600 text-sm">The secret stays hidden.</p>
                                </div>
                            )}
                            <div className="mt-auto w-full max-w-sm">
                                {isHost ? (
                                    <button onClick={handleNextRound} disabled={nextRoundPending} className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-purple-500/30 hover:border-purple-500/60 disabled:opacity-50 disabled:cursor-not-allowed" style={{ background: "linear-gradient(135deg,#6d28d9,#be185d)" }}>
                                        {nextRoundPending ? (
                                            <><Loader size={16} /> Advancing...</>
                                        ) : (
                                            <>Next Round <ChevronRight size={16} /></>
                                        )}
                                    </button>
                                ) : (
                                    <div className="text-center text-zinc-500 text-sm py-4">
                                        <Loader size={16} className="inline mr-2" />
                                        Waiting for host to advance round...
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParanoiaGame />);
    </script>
</body>
</html>
