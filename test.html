    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
        }

        /* Page Transitions */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideOutDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
        .page-enter {
            animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .page-exit {
            animation: slideOutDown 0.3s ease-out;
        }

        /* Coin Spin Animation - Enhanced */
        @keyframes spin-coin {
            0% { transform: rotateY(0) rotateX(0) scale(1); }
            25% { transform: rotateY(180deg) rotateX(90deg) scale(1.05); }
            50% { transform: rotateY(360deg) rotateX(180deg) scale(1); }
            75% { transform: rotateY(540deg) rotateX(270deg) scale(1.05); }
            100% { transform: rotateY(720deg) rotateX(360deg) scale(1); }
        }
        .spin-coin {
            animation: spin-coin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* Coin Pulse */
        @keyframes coin-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .coin-pop {
            animation: coin-pop 0.5s ease-out;
        }

        /* Enhanced Glow */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.4); }
            50% { box-shadow: 0 0 40px rgba(167, 139, 250, 0.8); }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* Button Press Animation */
        @keyframes button-press {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        button:active {
            animation: button-press 0.2s ease-out;
        }

        /* Smooth Stagger Animation */
        @keyframes stagger-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .stagger-item {
            animation: stagger-in 0.3s ease-out backwards;
        }

        /* Glass effect */
        .glass {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }
        .glass-strong {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(63, 63, 70, 0.6);
        }

        /* Smooth transitions */
        * {
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Input focus effect */
        input:focus {
            transition: all 0.3s ease;
        }

        /* Player card hover */
        .player-card {
            transition: all 0.3s ease;
        }
        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.2);
        }

        /* Loading animation */
        @keyframes spin-loader {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin-loader {
            animation: spin-loader 1s linear infinite;
        }

        /* Reveal animation */
        @keyframes reveal {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .reveal-in {
            animation: reveal 0.3s ease-out;
        }

        /* Badge pulse */
        @keyframes badge-pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }
        .badge-pulse {
            animation: badge-pulse 2s infinite;
        }
    </style>

        function initializeFirebase() {

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(FIREBASE_CONFIG);
                    console.log("✓ Firebase app initialized");

            );

        function ParanoiaGame() {
            const [appScreen, setAppScreen] = React.useState('landing');
            const [gameMode, setGameMode] = React.useState(null);
            const [players, setPlayers] = React.useState([]);
            const [currentPlayerIdx, setCurrentPlayerIdx] = React.useState(0);
            const [playerName, setPlayerName] = React.useState('');
            const [numPlayers, setNumPlayers] = React.useState(4);
            const [playerNames, setPlayerNames] = React.useState([]);
            const [onlineRoomCode, setOnlineRoomCode] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [playerId, setPlayerId] = React.useState(null);
            const [isHost, setIsHost] = React.useState(false);
            const [currentQuestion, setCurrentQuestion] = React.useState('');
            const [revealed, setRevealed] = React.useState(false);
            const [coinFlipping, setCoinFlipping] = React.useState(false);
            const [coinResult, setCoinResult] = React.useState(null);
            const [gameState, setGameState] = React.useState('setup');
            const [isOnline, setIsOnline] = React.useState(false);
            const [maxPlayers, setMaxPlayers] = React.useState(4);
            const [fadeOut, setFadeOut] = React.useState(false);
            const roomRefRef = React.useRef(null);
            const [syncError, setSyncError] = React.useState(null);

            React.useEffect(() => {
                initializeFirebase();
            }, []);

            // Firebase sync for multiplayer
            React.useEffect(() => {
                if (!isOnline || !onlineRoomCode) return;

                if (!db) {
                    console.warn("Firebase not ready for sync");
                    setSyncError("Firebase not connected");
                    return;
                }

                const roomRef = db.ref(`rooms/${onlineRoomCode}`);
                roomRefRef.current = roomRef;

                // Listen to room changes
                const onValue = (snapshot) => {
                    const roomData = snapshot.val();
                    if (roomData && roomData.players) {
                        const playerList = Object.values(roomData.players).filter(p => p !== null);
                        setPlayers(playerList);
                        if (roomData.gameState) {
                            setGameState(roomData.gameState);
                            setCurrentPlayerIdx(roomData.currentPlayerIdx || 0);
                            setCurrentQuestion(roomData.currentQuestion || '');
                            setCoinResult(roomData.coinResult || null);
                            setCoinFlipping(roomData.coinFlipping || false);
                        }
                    }
                };

                const onError = (error) => {
                    console.error("Firebase sync error:", error.code, error.message);
                    setSyncError(`Sync error: ${error.message}`);
                };

                roomRef.on('value', onValue, onError);

                return () => {
                    roomRef.off('value', onValue);
                };
            }, [isOnline, onlineRoomCode]);

            // Update room data when state changes
            const updateRoomData = (updates) => {
                if (!isOnline || !onlineRoomCode || !db) return;
                const roomRef = db.ref(`rooms/${onlineRoomCode}`);
                roomRef.update(updates).catch(err => {
                    console.warn("Update failed:", err.message);
                });
            };

            // Sync players when local players change
            React.useEffect(() => {
                if (isOnline && onlineRoomCode && players.length > 0) {
                    const playersObj = {};
                    players.forEach((p, idx) => {
                        playersObj[p.id] = p;
                    });
                    updateRoomData({ players: playersObj });
                }
            }, [players, isOnline, onlineRoomCode]);

            const getRandomQuestion = () => {
                const allQuestions = Object.values(QUESTIONS).flat();
                return allQuestions[Math.floor(Math.random() * allQuestions.length)];
            };

            const navigateTo = (screen) => {
                setFadeOut(true);
                setTimeout(() => {
                    setAppScreen(screen);
                    setFadeOut(false);
                }, 200);
            };

            const handleStartLocalGame = () => {
                if (!playerName.trim()) return;
                setLoading(true);
                setTimeout(() => {
                    const newPlayers = playerNames.map((name, i) => ({
                        id: i.toString(),
                        name: name || `Player ${i + 1}`,
                        isHost: i === 0
                    }));
                    setPlayers(newPlayers);
                    setPlayerId('0');
                    setIsHost(true);
                    setIsOnline(false);
                    setGameState('lobby');
                    setLoading(false);
                }, 500);
            };

            const handleCreateOnlineGame = () => {
                if (!playerName.trim()) return;
                
                if (!db) {
                    alert("Firebase not connected.\n\n1. Check your internet connection\n2. Refresh the page\n3. Check browser console (F12) for errors\n\nIf still failing, you can play in local mode instead.");
                    return;
                }

                setLoading(true);
                
                const code = generateRoomCode();
                const newId = Math.random().toString(36).substr(2, 9);
                const timestamp = Date.now();
                
                const roomRef = db.ref(`rooms/${code}`);
                const initialData = {
                    code: code,
                    hostId: newId,
                    maxPlayers: numPlayers,
                    createdAt: timestamp,
                    gameState: 'lobby',
                    players: {
                        [newId]: {
                            id: newId,
                            name: playerName,
                            isHost: true
                        }
                    }
                };
                
                roomRef.set(initialData).then(() => {
                    console.log("✓ Room created:", code);
                    setTimeout(() => {
                        setOnlineRoomCode(code);
                        setPlayerId(newId);
                        setIsHost(true);
                        setPlayers([{ id: newId, name: playerName, isHost: true }]);
                        setIsOnline(true);
                        setMaxPlayers(numPlayers);
                        setGameState('lobby');
                        setLoading(false);
                        setSyncError(null);
                    }, 300);
                }).catch(err => {
                    console.error("✗ Failed to create room:", err.message);
                    alert(`Failed to create room: ${err.message}\n\nCheck:\n- Internet connection\n- Firebase rules allow write access\n- Database URL is correct`);
                    setLoading(false);
                });
            };

            const handleJoinOnlineGame = () => {
                if (!playerName.trim() || !onlineRoomCode.trim()) {
                    alert('Please enter your name and room code');
                    return;
                }

                if (!db) {
                    alert("Firebase not connected.\n\n1. Check your internet connection\n2. Refresh the page\n3. Check browser console (F12) for errors");
                    return;
                }

                setLoading(true);
                
                const roomRef = db.ref(`rooms/${onlineRoomCode.trim()}`);
                roomRef.get().then((snapshot) => {
                    if (!snapshot.exists()) {
                        alert('Room not found. Check the code and try again.');
                        setLoading(false);
                        return;
                    }

                    const roomData = snapshot.val();
                    const currentPlayers = Object.values(roomData.players || {});

                    if (currentPlayers.length >= roomData.maxPlayers) {
                        alert('Room is full!');
                        setLoading(false);
                        return;
                    }

                    const newId = Math.random().toString(36).substr(2, 9);
                    const newPlayer = {
                        id: newId,
                        name: playerName,
                        isHost: false
                    };

                    // Add new player to room
                    roomRef.update({
                        [`players/${newId}`]: newPlayer
                    }).then(() => {
                        console.log("✓ Joined room:", onlineRoomCode.trim());
                        setTimeout(() => {
                            setOnlineRoomCode(onlineRoomCode.trim());
                            setPlayerId(newId);
                            setIsHost(false);
                            setPlayers([...currentPlayers, newPlayer]);
                            setIsOnline(true);
                            setMaxPlayers(roomData.maxPlayers);
                            setGameState('lobby');
                            setLoading(false);
                            setSyncError(null);
                        }, 300);
                    }).catch(err => {
                        console.error("✗ Failed to join room:", err.message);
                        alert(`Failed to join room: ${err.message}`);
                        setLoading(false);
                    });
                }).catch(err => {
                    console.error("✗ Failed to get room:", err.message);
                    alert(`Connection error: ${err.message}\n\nMake sure the room code is correct.`);
                    setLoading(false);
                });
            };

            const handleStartGameSession = () => {
                if (players.length < 2) {
                    alert('Need at least 2 players to start');
                    return;
                }
                const question = getRandomQuestion();
                setCurrentQuestion(question);
                setCurrentPlayerIdx(0);
                setGameState('playing');
                setRevealed(false);
                setCoinResult(null);
                
                if (isOnline && onlineRoomCode) {
                    updateRoomData({
                        gameState: 'playing',
                        currentQuestion: question,
                        currentPlayerIdx: 0
                    });
                }
            };

            const handleFlipCoin = () => {
                setCoinFlipping(true);
                if (isOnline && onlineRoomCode) {
                    updateRoomData({ coinFlipping: true });
                }
                setTimeout(() => {
                    const result = Math.random() > 0.5 ? 'heads' : 'tails';
                    setCoinResult(result);
                    setCoinFlipping(false);
                    if (isOnline && onlineRoomCode) {
                        updateRoomData({ 
                            coinFlipping: false,
                            coinResult: result
                        });
                    }
                }, 1000);
            };

            const handleNextRound = () => {
                const question = getRandomQuestion();
                const nextIdx = (currentPlayerIdx + 1) % players.length;
                setCurrentQuestion(question);
                setCurrentPlayerIdx(nextIdx);
                setRevealed(false);
                setCoinResult(null);
                
                if (isOnline && onlineRoomCode) {

                        currentQuestion: question,
                        currentPlayerIdx: nextIdx,
                        coinResult: null
                    });

            const handleBackToLanding = () => {
                // Remove player from room when leaving
                if (isOnline && onlineRoomCode && playerId && db) {
                    const roomRef = db.ref(`rooms/${onlineRoomCode}`);
                    roomRef.get().then((snapshot) => {
                        const roomData = snapshot.val();
                        if (roomData) {
                            roomRef.update({
                                [`players/${playerId}`]: null
                            }).catch(err => console.warn("Couldn't remove player:", err.message));
                        }
                    });
                }

                // Cleanup
                if (roomRefRef.current) {
                    roomRefRef.current.off();
                }

                navigateTo('landing');
                setGameMode(null);
                setGameState('setup');
                setPlayers([]);
                setCurrentPlayerIdx(0);
                setPlayerName('');
                setPlayerNames([]);
                setCurrentQuestion('');
                setRevealed(false);
                setCoinFlipping(false);
                setCoinResult(null);
                setOnlineRoomCode('');
                setSyncError(null);

            if (appScreen === 'mode-select') {

                                <StaggerItem index={1}>
                                    <button

                                            setGameMode('online');
                                            navigateTo('setup');

                                        <div className="text-2xl mb-2">🌐</div>

                            </div>

                            <button

                            >
                                ← Back
                            </button>
                        </div>
                    </div>

            if (appScreen === 'setup' && gameState === 'setup') {

                                <div className="w-full max-w-md space-y-5">
                                    <div>
                                        <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label>
                                        <input
                                            type="text"
                                            value={playerName}
                                            onChange={(e) => setPlayerName(e.target.value)}

                                            className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-violet-500"

                                    <div>

                                            type="range"
                                            min="2"
                                            max="20"

                                        <div className="text-zinc-500 text-xs mt-2">Selected: {numPlayers} players</div>

                                        />
                                    </div>
                                </div>

                                <div className="flex gap-4 w-full max-w-xs">
                                    <button
                                        onClick={() => setGameMode('online')}
                                        className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors"

                                        Back

                                    <button

                                    >

                                    </button>
                                </div>
                            </div>
                        </div>

                if (gameMode === 'join-online') {
                    return (

                                <div className="w-full max-w-xs space-y-4">
                                    <div>
                                        <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Your Name</label>
                                        <input
                                            type="text"
                                            value={playerName}
                                            onChange={(e) => setPlayerName(e.target.value)}
                                            placeholder="Enter your name"
                                            className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white focus:outline-none focus:border-fuchsia-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="text-zinc-400 text-sm uppercase tracking-widest font-semibold block mb-2">Room Code</label>
                                        <input
                                            type="text"
                                            value={onlineRoomCode}
                                            onChange={(e) => setOnlineRoomCode(e.target.value.toUpperCase())}
                                            placeholder="e.g., ABC123"
                                            maxLength="6"
                                            className="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-center text-lg font-bold focus:outline-none focus:border-fuchsia-500 tracking-widest"
                                        />
                                    </div>
                                </div>

                                <div className="flex gap-4 w-full max-w-xs">
                                    <button
                                        onClick={() => setGameMode('online')}
                                        className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-zinc-800 hover:bg-zinc-700 transition-colors"
                                    >
                                        Back
                                    </button>
                                    <button
                                        onClick={handleJoinOnlineGame}
                                        disabled={!playerName.trim() || !onlineRoomCode.trim() || loading}
                                        className="flex-1 py-3 rounded-lg font-display font-bold uppercase tracking-widest text-sm bg-fuchsia-600 hover:bg-fuchsia-500 transition-colors disabled:opacity-50 flex items-center justify-center gap-2"
                                    >
                                        {loading ? <><Loader size={14} /> Joining...</> : 'Join'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }
            }

            // Lobby Screen
            if (gameState === 'lobby') {
                return (
                    <div className={containerClass}>
                        <div className="flex flex-col min-h-screen px-6 pt-8 pb-8">
                            <div className="mb-8">
                                <h2 className="font-display text-3xl font-extrabold mb-2">Game Lobby</h2>
                                {onlineRoomCode && (
                                    <div>
                                        <div className="glass rounded-lg px-4 py-2 inline-flex items-center gap-2 text-sm text-cyan-400 border-zinc-800 badge-pulse">
                                            <span className="font-mono font-bold text-lg">{onlineRoomCode}</span>
                                            <button onClick={() => {
                                                navigator.clipboard.writeText(onlineRoomCode);
                                            }} className="hover:text-cyan-300 transition-colors">
                                                <Copy size={14} />
                                            </button>
                                        </div>
                                        {syncError && (
                                            <div className="mt-2 text-xs text-yellow-600 bg-yellow-950/40 border border-yellow-800 rounded px-3 py-2">
                                                ⚠️ {syncError}
                                            </div>
                                        )}
                                        {!syncError && db && (
                                            <div className="mt-2 text-xs text-green-600 bg-green-950/40 border border-green-800 rounded px-3 py-2">
                                                ✓ Connected - players syncing live
                                            </div>
                                        )}
                                        {!db && (
                                            <div className="mt-2 text-xs text-red-600 bg-red-950/40 border border-red-800 rounded px-3 py-2">
                                                ✗ Firebase connection failed. Check browser console (F12) for details.
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            <div className="flex-1">
                                <h3 className="text-zinc-400 text-xs uppercase tracking-widest font-semibold mb-4">Players ({players.length}/{maxPlayers})</h3>
                                <div className="space-y-2">
                                    {players.length === 0 ? (
                                        <div className="text-zinc-500 text-sm py-4 text-center">Waiting for players...</div>
                                    ) : (

                                            <StaggerItem key={p.id} index={idx}>
                                                <div className="glass player-card rounded-lg px-4 py-3 flex items-center justify-between border-zinc-800">
                                                    <span className="text-white font-medium">{p.name}</span>

                                                </div>
                                            </StaggerItem>
                                        ))
                                    )}
                                </div>
                            </div>

                            <div className="mt-auto pt-6 space-y-3">

                                    <button
                                        onClick={handleStartGameSession}
                                        disabled={players.length < 2}

                                    <div className="text-center text-zinc-500 text-sm py-4">

                                </button>

            if (gameState === 'playing') {

                    return (

                                    question={currentQuestion}
                                    others={players.map(p => p.name).filter((_, i) => i !== currentPlayerIdx)}
                                    onFlip={handleFlipCoin}
                                    revealed={revealed}
                                    setRevealed={setRevealed}

                                <div key={n} className="flex items-start gap-3">

                <div className="page-enter flex flex-col items-center min-h-screen px-5 pt-14 pb-8 text-center">
                    <div className="w-24 h-24 rounded-full flex items-center justify-center mb-5 text-zinc-100 reveal-in"
                        style={{ background: isHeads ? "linear-gradient(135deg,#0e7490,#06b6d4)" : "linear-gradient(135deg,#be185d,#7c3aed)", boxShadow: isHeads ? "0 0 40px rgba(6,182,212,0.15)" : "0 0 40px rgba(219,39,119,0.15)" }}>
                        {isHeads ? (
                            <Eye size={36} className="text-cyan-100" />
                        ) : (
                            <span className="text-3xl font-bold text-fuchsia-100">M</span>
                        )}
                    </div>
                    <div className={`font-display text-5xl font-extrabold mb-2 ${isHeads ? "text-cyan-400" : "text-fuchsia-400"}`}>
                        {isHeads ? "HEADS" : "TAILS"}
                    </div>
                    <div className="font-display text-lg font-bold text-zinc-500 uppercase tracking-widest mb-8">
                        {isHeads ? "Question Revealed!" : "Forever a Secret"}
                    </div>
                    {isHeads ? (
                        <div className="glass-strong rounded-2xl p-5 mb-4 w-full text-left border-zinc-700 reveal-in">
                            <p className="text-xs text-zinc-500 uppercase tracking-widest font-semibold mb-2">The question was…</p>
                            <p className="font-display text-lg font-bold leading-snug text-zinc-100">{question}</p>
                            <p className="text-zinc-500 text-sm mt-3">Now everyone knows exactly why <strong className="text-zinc-400">{asker}</strong> said what they said!</p>
                        </div>
                    ) : (
                        <div className="glass rounded-2xl p-5 mb-4 w-full border-zinc-800 reveal-in">
                            <p className="font-display text-base font-bold text-zinc-600 italic mb-1">"What did they mean…?"</p>
                            <p className="text-zinc-600 text-sm"><strong className="text-zinc-500">{asker}</strong> takes the secret to the grave. Stay paranoid.</p>
                        </div>
                    )}
                    <div className="mt-auto w-full">
                        <button onClick={onNext}
                            className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-purple-500/30 hover:border-purple-500/60"
                            style={{ background: "linear-gradient(135deg,#6d28d9,#be185d)" }}
                        >
                            Next Round <ChevronRight size={16} />
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParanoiaGame />);
    </script>
</body>
</html>
