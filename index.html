<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranoia - The Ultimate Party Game</title>
    
    <!-- PWA Setup -->
    <meta name="theme-color" content="#0a0a0c">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236d28d9' width='100' height='100'/><text x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'>?</text></svg>">
    <link rel="manifest" href="manifest.json">
    
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React & React-DOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load Babel Standalone to compile JSX natively in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configure Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
        }
        @keyframes spin-coin {
          0% { transform: rotateY(0deg) rotateX(0deg); }
          50% { transform: rotateY(1800deg) rotateX(360deg); }
          100% { transform: rotateY(3600deg) rotateX(720deg); }
        }
        .spin-coin {
          animation: spin-coin 1.2s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // Icons
        function Plus({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        }
        function Trash2({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        }
        function Eye({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>;
        }
        function EyeOff({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.578 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 9.415a3 3 0 0 0-4.669 4.11"/><path d="m2 2 20 20"/><path d="M4.532 4.532A10.738 10.738 0 0 0 2.062 11.65a1 1 0 0 0 0 .696 10.75 10.75 0 0 0 11.754 6.744"/></svg>;
        }
        function ChevronRight({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        }
        function Zap({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m13 2-2 10h9L9 22l2-10H2Z"/></svg>;
        }
        function Shuffle({ size = 16, className = "" }) {
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.2 0 2.3.6 3 1.7l1.1 1.6"/><path d="m15.4 12.8 1.2 1.7c.8 1.1 2 1.7 3.2 1.7H22"/><path d="m18 14 4 4-4 4"/></svg>;
        }

        const QUESTIONS = {
          icebreaker: [
            "Which player do you think is the most fun to be around?",
            "Who has the best fashion sense in the group?",
            "Who is most likely to cry during a sad movie?",
            "Who do you think is the best-dressed here?",
            "Who is the least likely to be up for a spontaneous plan?",
            "Who is most likely to become a social media influencer?",
            "Can you guess who here hasn't read a book since high school?",
            "Which player has the best sense of humor?",
            "Who tells the best dad jokes?",
            "Which person here would be the best on Big Brother?",
            "Who do you think has the most controversial food opinions?",
            "Who is most likely to volunteer as tribute in the Hunger Games?",
            "Who in this room do you trust the most?",
            "Who always has the best advice during a crisis?",
            "Who is the unsung soldier holding the group together?",
            "Which member in the group has grown the most in the past year?",
            "Who do you think will be the most successful in 10 years?",
            "Who here deserves more appreciation and recognition from the group?",
            "Which member do you think has a secret LEGO obsession?",
            "Who is most likely to adopt 10 pets in the future?",
            "Who has the most creative imagination?",
            "Who is most likely to get excited over an animated film?",
            "Which member in the group is the handiest at building things?",
            "Which player gives the cuddliest hugs?",
            "Who amongst the group do you think is the luckiest in love?",
            "Which member are you secretly very afraid of?",
            "Who sitting here is likely to get jealous if you go out with a new friend?",
            "Which player are you least likely to call during an emergency?",
            "Who is most likely to embarrass a friend in public?",
            "Pick someone in the group who is most likely to have a weird phobia",
            "Who do you think deserves a better romantic partner?",
          ],
          funny: [
            "Who is most likely to get lost even with a GPS?",
            "Who's most likely to be late for a plan because they stopped to pet a dog?",
            "Who do you think has the most embarrassing Spotify playlists?",
            "Who's most likely to get blocked by a celebrity on social media?",
            "Who is guilty of never matching their socks?",
            "Who should have a reality TV show based on their life?",
            "Who would accidentally send a text to the wrong person?",
            "Who do you think has the highest alcohol tolerance?",
            "Which member has the best dance moves when drunk?",
            "Who do you think is the life of the party?",
            "Which player throws the best parties?",
            "Who is most likely to start a conga line?",
            "Which player in the group is most likely to have the sickest playlist?",
            "Who is most likely to be the party pooper?",
            "Who is most likely to finish all the party snacks when no one's watching?",
            "Who can't cook to save their life?",
            "Who's the gossip monger of the group?",
            "Who is the worst texter present here?",
            "Who is most likely to get an embarrassing tattoo?",
            "Which player is pursuing the wrong career?",
            "Who would forget their own birthday without social media?",
            "Who is most likely to show up to an event at the wrong time?",
            "Who is most likely to have a really weird talent nobody knows about?",
            "Who is most likely to break something in this room?",
            "Who would be the worst person to go on a road trip with?",
            "Who's most likely to eat all the pizza before anyone else gets a slice?",
            "Who's the person most likely to bring a terrible present to a gift exchange?",
          ],
          deep: [
            "Who do you think would make a great therapist?",
            "If you could give one person in this room a superpower, who would it be?",
            "Who in this group has changed the most since you met them?",
            "Who do you think is the most authentic person here?",
            "Whose life would you most want to live for a day?",
            "Who do you think has untapped potential?",
            "Who has taught you the most valuable life lesson?",
            "Who does a better job at hiding their anxiety?",
            "Who do you think is the most brave person here?",
            "Who always encourages others when they feel down?",
          ]
        };

        function ParanoiaGame() {
          const [players, setPlayers] = React.useState([]);
          const [newPlayer, setNewPlayer] = React.useState("");
          const [screen, setScreen] = React.useState("setup");
          const [currentPlayerIndex, setCurrentPlayerIndex] = React.useState(0);
          const [question, setQuestion] = React.useState("");
          const [revealed, setRevealed] = React.useState(false);
          const [coinResult, setCoinResult] = React.useState(null);
          const [selectedCategory, setSelectedCategory] = React.useState("icebreaker");

          const others = players.filter((_, i) => i !== currentPlayerIndex);

          const getRandomQuestion = () => {
            const questions = QUESTIONS[selectedCategory];
            return questions[Math.floor(Math.random() * questions.length)];
          };

          const handleAddPlayer = () => {
            if (newPlayer.trim() && newPlayer.length < 20) {
              setPlayers([...players, newPlayer]);
              setNewPlayer("");
            }
          };

          const handleRemovePlayer = (index) => {
            setPlayers(players.filter((_, i) => i !== index));
          };

          const handleStartGame = () => {
            if (players.length >= 2) {
              setCurrentPlayerIndex(0);
              setQuestion(getRandomQuestion());
              setRevealed(false);
              setCoinResult(null);
              setScreen("gameshow");
            }
          };

          const handleFlip = () => {
            const result = Math.random() > 0.5 ? "heads" : "tails";
            setCoinResult(result);
            setScreen("result");
          };

          const handleNext = () => {
            const nextIndex = (currentPlayerIndex + 1) % players.length;
            setCurrentPlayerIndex(nextIndex);
            setQuestion(getRandomQuestion());
            setRevealed(false);
            setCoinResult(null);
            setScreen("gameshow");
          };

          // Setup Screen
          if (screen === "setup") {
            return (
              <div className="flex flex-col items-center justify-center min-h-screen px-5 py-8">
                <div className="mb-8">
                  <div className="w-20 h-20 rounded-2xl flex items-center justify-center mb-4" style={{ background: "linear-gradient(135deg,#6d28d9,#be185d)" }}>
                    <span className="text-4xl font-bold text-white">?</span>
                  </div>
                  <h1 className="font-display text-5xl font-extrabold text-white mb-2 text-center">Paranoia</h1>
                  <p className="text-zinc-500 text-center">The party game nobody asked for</p>
                </div>

                <div className="w-full max-w-sm mb-6">
                  <label className="block text-xs uppercase tracking-widest text-zinc-600 font-semibold mb-2">Choose a category</label>
                  <div className="flex gap-2">
                    {Object.keys(QUESTIONS).map((category) => (
                      <button
                        key={category}
                        onClick={() => setSelectedCategory(category)}
                        className={`flex-1 py-2 px-3 rounded-lg text-xs font-semibold uppercase transition-all ${selectedCategory === category ? "bg-purple-600 text-white" : "bg-zinc-900 text-zinc-400 border border-zinc-800"}`}
                      >
                        {category}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="w-full max-w-sm mb-4">
                  <label className="block text-xs uppercase tracking-widest text-zinc-600 font-semibold mb-3">Add players</label>
                  <div className="flex gap-2 mb-4">
                    <input
                      type="text"
                      value={newPlayer}
                      onChange={(e) => setNewPlayer(e.target.value)}
                      onKeyPress={(e) => e.key === "Enter" && handleAddPlayer()}
                      placeholder="Enter name…"
                      maxLength="19"
                      className="flex-1 px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-purple-600"
                    />
                    <button onClick={handleAddPlayer} className="px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-700 transition-colors">
                      <Plus size={20} />
                    </button>
                  </div>

                  <div className="space-y-2 max-h-64 overflow-y-auto mb-4">
                    {players.map((player, i) => (
                      <div key={i} className="flex items-center justify-between px-4 py-3 rounded-xl bg-zinc-900/50 border border-zinc-800">
                        <span className="text-zinc-100 text-sm">{player}</span>
                        <button onClick={() => handleRemovePlayer(i)} className="text-zinc-600 hover:text-red-500 transition-colors">
                          <Trash2 size={16} />
                        </button>
                      </div>
                    ))}
                  </div>

                  <button
                    onClick={handleStartGame}
                    disabled={players.length < 2}
                    className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 border border-green-500/30"
                    style={{ background: "linear-gradient(135deg,#10b981,#059669)" }}
                  >
                    <Zap size={18} /> Start Game
                  </button>
                </div>

                <p className="text-zinc-600 text-xs max-w-sm">
                  {players.length < 2 ? "Add at least 2 players to start" : `Ready to play with ${players.length} players!`}
                </p>
              </div>
            );
          }

          if (screen === "gameshow") {
            const asker = players[currentPlayerIndex];
            return (
              <div className="flex flex-col items-center justify-center min-h-screen px-6 py-8">
                <div className="rounded-xl px-4 py-2 mb-6 self-start flex items-center gap-2 text-xs text-violet-400 font-semibold uppercase tracking-widest bg-zinc-900/50 border border-zinc-800">
                  <Eye size={11} /> Only you, {asker}
                </div>
                <div className="mb-5">
                  <p className="text-zinc-500 text-xs uppercase tracking-widest mb-1 font-semibold">Your secret question</p>
                  <div className="rounded-2xl p-5 relative overflow-hidden border-zinc-700 bg-zinc-900/50 border">
                    {!revealed && (
                      <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#0a0a0c]/95 backdrop-blur-md rounded-2xl z-10 cursor-pointer" onClick={() => setRevealed(true)}>
                        <EyeOff size={28} className="text-zinc-600 mb-2" />
                        <span className="text-zinc-500 text-sm">Tap to reveal</span>
                      </div>
                    )}
                    <p className="font-display text-xl font-bold leading-snug text-zinc-100">{question}</p>
                    <div className="mt-3 flex flex-wrap gap-1.5">
                      {others.map((p) => (
                        <span key={p} className="text-xs px-2.5 py-1 rounded-full text-fuchsia-400 border-zinc-800 font-medium bg-zinc-900/50 border">{p}</span>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="rounded-2xl p-4 mb-6 border-zinc-800 bg-zinc-900/50 border">
                  <h3 className="font-display text-sm font-bold uppercase tracking-widest text-zinc-500 mb-3">How to play</h3>
                  <div className="space-y-2.5">
                    {[["1","Read the question above silently."],["2","Answer OUT LOUD to everyone — say a player's name."],["3","Flip the coin to decide if the question gets revealed."]].map(([n,text]) => (
                      <div key={n} className="flex items-start gap-3">
                        <span className="w-5 h-5 rounded-full bg-violet-950 text-violet-400 border border-violet-800 text-xs flex items-center justify-center shrink-0 mt-0.5 font-bold">{n}</span>
                        <span className="text-zinc-400 text-sm leading-relaxed">{text}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="mt-auto">
                  <p className="text-center text-zinc-600 text-xs mb-3">Once you've announced your answer…</p>
                  <button onClick={() => handleFlip()}
                    className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-cyan-500/30"
                    style={{ background: "linear-gradient(135deg,#0e7490,#6d28d9)" }}
                  >
                    <Shuffle size={16} /> Flip the Coin
                  </button>
                </div>
              </div>
            );
          }

          if (screen === "result") {
            const isHeads = coinResult === "heads";
            return (
              <div className="flex flex-col items-center min-h-screen px-5 pt-14 pb-8 text-center">
                <div className="w-24 h-24 rounded-full flex items-center justify-center mb-5 text-zinc-100"
                  style={{ background: isHeads ? "linear-gradient(135deg,#0e7490,#06b6d4)" : "linear-gradient(135deg,#be185d,#7c3aed)", boxShadow: isHeads ? "0 0 40px rgba(6,182,212,0.15)" : "0 0 40px rgba(219,39,119,0.15)" }}>
                  {isHeads ? (
                    <Eye size={36} className="text-cyan-100" />
                  ) : (
                    <span className="text-3xl font-bold text-fuchsia-100">M</span>
                  )}
                </div>
                <div className={`font-display text-5xl font-extrabold mb-2 ${isHeads ? "text-cyan-400" : "text-fuchsia-400"}`}>
                  {isHeads ? "HEADS" : "TAILS"}
                </div>
                <div className="font-display text-lg font-bold text-zinc-500 uppercase tracking-widest mb-8">
                  {isHeads ? "Question Revealed!" : "Forever a Secret"}
                </div>
                {isHeads ? (
                  <div className="rounded-2xl p-5 mb-4 w-full text-left border-zinc-700 bg-zinc-900/50 border">
                    <p className="text-xs text-zinc-500 uppercase tracking-widest font-semibold mb-2">The question was…</p>
                    <p className="font-display text-lg font-bold leading-snug text-zinc-100">{question}</p>
                    <p className="text-zinc-500 text-sm mt-3">Now everyone knows exactly why <strong className="text-zinc-400">{players[currentPlayerIndex]}</strong> said what they said!</p>
                  </div>
                ) : (
                  <div className="rounded-2xl p-5 mb-4 w-full border-zinc-800 bg-zinc-900/50 border">
                    <p className="font-display text-base font-bold text-zinc-600 italic mb-1">"What did they mean…?"</p>
                    <p className="text-zinc-600 text-sm"><strong className="text-zinc-500">{players[currentPlayerIndex]}</strong> takes the secret to the grave. Stay paranoid.</p>
                  </div>
                )}
                <div className="mt-auto w-full">
                  <button onClick={() => handleNext()}
                    className="w-full py-4 rounded-2xl font-display font-bold text-base uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 border border-purple-500/30"
                    style={{ background: "linear-gradient(135deg,#6d28d9,#be185d)" }}
                  >
                    Next Round <ChevronRight size={16} />
                  </button>
                </div>
              </div>
            );
          }
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParanoiaGame />);
    </script>
</body>
</html>
