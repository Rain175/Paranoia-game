<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranoia - The Ultimate Party Game</title>
    
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        Babel.registerPreset('react-classic', {
            presets: [[Babel.availablePresets.react, { "runtime": "classic" }]]
        });
    </script>

    <style>
        body { background-color: #0a0a0c; color: white; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        // Define your questions array here
        const QUESTIONS = [
            "Who is most likely to survive a zombie apocalypse?",
            "Who would accidentally join a cult?",
            "Who would get lost with a GPS?"
        ];

        function App() {
            const [currentQ, setCurrentQ] = React.useState(0);

            return (
                <div className="p-10 flex flex-col items-center justify-center min-h-screen">
                    <h1 className="text-3xl font-bold mb-6">Paranoia Game</h1>
                    <div className="p-6 bg-zinc-900 rounded-lg border border-zinc-800">
                        <p className="text-xl">{QUESTIONS[currentQ]}</p>
                    </div>
                    <button 
                        className="mt-6 px-6 py-2 bg-purple-600 rounded"
                        onClick={() => setCurrentQ((prev) => (prev + 1) % QUESTIONS.length)}
                    >
                        Next Question
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.error('SW Registration failed:', err));
            });
        }
    </script>
</body>
</html>
