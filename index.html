<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranoia - The Ultimate Party Game</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets.react, { "runtime": "classic" }]
            ]
        });
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        function App() {
            return (
                <div className="p-10 text-white">
                    <h1 className="text-2xl">Game Loaded Successfully!</h1>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
